name: Daily Digest

on:
  workflow_dispatch:
  schedule:
    - cron: "17 0 * * *"

permissions:
  contents: write

concurrency:
  group: daily-digest-main
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    env:
      NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
      TZ: Asia/Bangkok
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest -q

      - name: Generate live digest
        run: python -m med_digest.cli --live --date "$(date +%F)"

      - name: Commit digest outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for attempt in 1 2 3; do
            git fetch origin main
            git reset --mixed origin/main
            git add digests/*.md data/papers.csv
            if git diff --cached --quiet; then
              echo "No digest output changes to commit."
              exit 0
            fi
            git commit -m "Update daily pathology digest"
            git push && exit 0
            echo "Push failed; retrying after refreshing origin/main."
            sleep 2
          done
          echo "Failed to push digest outputs after retries." >&2
          exit 1

      - name: Send Telegram summary
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DIGEST_URL: https://github.com/${{ github.repository }}/blob/main/digests/latest.md
        run: python -m med_digest.telegram_notify --digest digests/latest.md --url "$DIGEST_URL"
