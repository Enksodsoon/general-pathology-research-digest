name: Daily Digest

on:
  workflow_dispatch:
  schedule:
    - cron: "17 0 * * *"

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    env:
      NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      TZ: Asia/Bangkok
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest -q

      - name: Generate live digest
        run: python -m med_digest.cli --live --date "$(date +%F)"

      - name: Commit digest outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add digests/*.md data/papers.csv
          git diff --cached --quiet || git commit -m "Update daily pathology digest"
          git push
